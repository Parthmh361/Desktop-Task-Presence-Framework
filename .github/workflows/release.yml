name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build npm packages
        run: >-
          pnpm build
          --filter=@dtpf/shared-types
          --filter=@dtpf/sdk-core
          --filter=@dtpf/sdk-react

      - name: Publish to npm
        run: >-
          pnpm publish
          --filter @dtpf/shared-types
          --filter @dtpf/sdk-core
          --filter @dtpf/sdk-react
          --access public
          --no-git-checks
        env:
          # Requires repository secret: NPM_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev pkg-config

      - name: Install dependencies
        run: pnpm install

      - name: Build sticky note UI
        run: pnpm --filter sticky-note-ui build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing secrets (unsigned builds work without these):
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop-agent
          tagName: ${{ github.ref_name }}
          releaseName: 'DTPF Agent v__VERSION__'
          releaseBody: |
            ## Desktop agent

            Install the DTPF Agent for your platform from the assets below.

            ## npm packages

            - [@dtpf/shared-types](https://www.npmjs.com/package/@dtpf/shared-types)
            - [@dtpf/sdk-core](https://www.npmjs.com/package/@dtpf/sdk-core)
            - [@dtpf/sdk-react](https://www.npmjs.com/package/@dtpf/sdk-react)

            ```bash
            npm install @dtpf/sdk-react
            ```

            See the [documentation](https://github.com/dtpf/desktop-task-presence-framework/tree/main/apps/docs) for quick start instructions.
          releaseDraft: false
          prerelease: false
