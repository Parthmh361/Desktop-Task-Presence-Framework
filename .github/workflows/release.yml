name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build npm packages
        run: >-
          pnpm build
          --filter=@dtpf/shared-types
          --filter=@dtpf/sdk-core
          --filter=@dtpf/sdk-react
          --filter=@dtpf/sdk-vanilla

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not configured — skipping npm publish."
            echo "Add an npm automation token in GitHub Settings → Secrets → Actions. See RELEASE.md."
            exit 0
          fi
          pnpm publish \
            --filter @dtpf/shared-types \
            --filter @dtpf/sdk-core \
            --filter @dtpf/sdk-react \
            --filter @dtpf/sdk-vanilla \
            --access public \
            --no-git-checks

  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      is_draft: ${{ steps.release.outputs.draft }}
    steps:
      - name: Get or create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_ID=$(gh release view "$TAG" --json databaseId -q .databaseId)
            IS_DRAFT=$(gh release view "$TAG" --json isDraft -q .isDraft)
            echo "Using existing release $TAG (id=$RELEASE_ID, draft=$IS_DRAFT)"
          else
            gh release create "$TAG" \
              --draft \
              --title "DTPF Agent ${TAG#v}" \
              --notes "Release artifacts uploading…"
            RELEASE_ID=$(gh release view "$TAG" --json databaseId -q .databaseId)
            IS_DRAFT=true
            echo "Created draft release $TAG (id=$RELEASE_ID)"
          fi
          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsecret-1-dev pkg-config

      - name: Install dependencies
        run: pnpm install

      - name: Build sticky note UI
        run: pnpm --filter sticky-note-ui build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop-agent
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: ${{ needs.prepare-release.outputs.is_draft == 'true' }}
          releaseName: 'DTPF Agent v__VERSION__'
          releaseBody: |
            ## Desktop agent

            Install the DTPF Agent for your platform from the assets below.

            ## npm packages

            - [@dtpf/shared-types](https://www.npmjs.com/package/@dtpf/shared-types)
            - [@dtpf/sdk-core](https://www.npmjs.com/package/@dtpf/sdk-core)
            - [@dtpf/sdk-react](https://www.npmjs.com/package/@dtpf/sdk-react)
            - [@dtpf/sdk-vanilla](https://www.npmjs.com/package/@dtpf/sdk-vanilla)

            ```bash
            npm install @dtpf/sdk-react
            ```

            See the [documentation](https://parthmh361.github.io/Desktop-Task-Presence-Framework/) or the [docs source](https://github.com/Parthmh361/Desktop-Task-Presence-Framework/tree/main/apps/docs) for quick start instructions.
          prerelease: false

  publish-release:
    needs: [prepare-release, build-tauri]
    if: needs.prepare-release.outputs.is_draft == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false
