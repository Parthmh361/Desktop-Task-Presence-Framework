name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build --filter=@dtpf/shared-types --filter=@dtpf/sdk-core --filter=@dtpf/sdk-react --filter=@dtpf/sdk-vanilla --filter=sticky-note-ui

      - name: Build demo app
        run: pnpm --filter react-basic build

      - name: Build docs site
        run: pnpm --filter @dtpf/docs build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsecret-1-dev pkg-config

      - name: Install dependencies
        run: pnpm install

      - name: Build packages (test dependency)
        run: pnpm build --filter=@dtpf/shared-types --filter=@dtpf/sdk-core

      - name: Test
        run: pnpm test

  build-agent:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsecret-1-dev pkg-config

      - name: Verify WebView2 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $key = 'HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}'
          if (-not (Test-Path $key)) {
            Write-Error 'WebView2 runtime not found on runner'
          }

      - name: Install dependencies
        run: pnpm install

      - name: Build sticky note UI
        run: pnpm --filter sticky-note-ui build

      - name: Cargo test
        working-directory: apps/desktop-agent/src-tauri
        run: cargo test

      - name: Cargo check
        working-directory: apps/desktop-agent/src-tauri
        run: cargo check
